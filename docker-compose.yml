services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-eco-app
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  # Dev service with hot reload (опционально)
  dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: it-eco-dev
    working_dir: /app
    ports:
      - "${DEV_PORT:-3001}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=false
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npm run dev:docker"
    restart: unless-stopped

volumes:
  app_data:
