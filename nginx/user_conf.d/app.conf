# =============================================================================
# nginx/user_conf.d/app.conf
# Конфиг для jonasal/nginx-certbot:
#   - образ сам добавляет блок HTTP (80) для ACME-challenge и редиректа
#   - здесь только HTTPS server-блоки
#   - SSL-сертификат запрашивается автоматически по server_name
# =============================================================================

# Главный домен — проксируем на Next.js
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name cpcore.ru;

    ssl_certificate     /etc/letsencrypt/live/cpcore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpcore.ru/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/dhparams/dhparam.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Буферы и таймауты для SSE / AI-стриминга
    proxy_buffering        off;
    proxy_read_timeout     300s;
    proxy_connect_timeout  10s;
    send_timeout           300s;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;

        # WebSocket + SSE
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}

# www → без www
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.cpcore.ru;

    ssl_certificate     /etc/letsencrypt/live/cpcore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpcore.ru/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/dhparams/dhparam.pem;

    return 301 https://cpcore.ru$request_uri;
}
